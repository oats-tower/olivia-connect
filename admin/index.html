<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Olivia Connect</title>
  <link rel="icon" type="image/svg+xml" href="/images/OC logo only.svg">
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <img src="/images/Olivia Connect.svg" alt="Olivia Connect" class="admin-login-logo">
      <h1 class="admin-login-title">Admin Portal</h1>
      <p class="admin-login-sub">Sign in to manage blog posts.</p>

      <form id="loginForm" class="admin-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <p id="loginError" class="form-error hidden"></p>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Sign In</button>
      </form>
    </div>
  </div>

  <script src="/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON);

    // Redirect if already logged in
    sb.auth.getSession().then(({ data }) => {
      if (data.session) location.replace('/admin/dashboard.html');
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      location.replace('/admin/dashboard.html');
    });
  </script>
</body>
</html>
